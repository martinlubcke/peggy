<!DOCTYPE html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Peggy - Pärlplattegenerator</title>
    <!-- Cropper.css -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.css" rel="stylesheet">
    <script type="module" crossorigin src="./assets/index-BjgHSo_c.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-BPnjJbOP.css">
  </head>
  <body>
    <div id="app">
      <header>
        <h1>Peggy</h1>
        <p>Skapa 29x29 pärlplattemönster</p>
      </header>
      <main>
        <section class="upload-section">
          <h2>1. Välj Palett</h2>
          <div class="palette-options">
            <button id="btn-standard-palette">Använd Hama Standardpalett</button>
            <span>eller</span>
            <label class="file-upload">
              Ladda upp pärlhink
              <input type="file" id="upload-bucket" accept="image/*" />
            </label>
          </div>
          <div id="current-palette-display" class="palette-display"></div>
          <div style="margin-top: 1rem; display: flex; align-items: center; gap: 0.5rem;">
            <button id="btn-add-color" title="Lägg till en egen färg">+</button>
            <span style="font-size: 0.85rem; opacity: 0.7;">Klicka på en färg för att inaktivera/aktivera den.</span>
            <input type="color" id="color-picker-input">
          </div>
        </section>

        <section class="upload-section">
          <h2>2. Välj Motivet</h2>
          <label class="file-upload">
            Ladda upp motiv
            <input type="file" id="upload-image" accept="image/*" />
          </label>
        </section>

        <section class="editor-section hidden" id="editor-section">
          <div class="crop-container">
            <h3>Beskär Bild (1:1)</h3>
            <div><img id="image-to-crop" /></div>
          </div>
          <div class="controls-container">
            <h3>Justeringar</h3>
            
            <label><span class="label-row"><span>Röd</span><span class="slider-value" id="val-r">100%</span></span><input type="range" id="slider-r" min="0" max="2" step="0.05" value="1"></label>
            <label><span class="label-row"><span>Grön</span><span class="slider-value" id="val-g">100%</span></span><input type="range" id="slider-g" min="0" max="2" step="0.05" value="1"></label>
            <label><span class="label-row"><span>Blå</span><span class="slider-value" id="val-b">100%</span></span><input type="range" id="slider-b" min="0" max="2" step="0.05" value="1"></label>
            <hr>
            <label><span class="label-row"><span>Kontrast</span><span class="slider-value" id="val-contrast">0</span></span><input type="range" id="slider-contrast" min="-100" max="100" step="1" value="0"></label>
            <label><span class="label-row"><span>Ljusstyrka</span><span class="slider-value" id="val-brightness">0</span></span><input type="range" id="slider-brightness" min="-255" max="255" step="1" value="0"></label>
            <label><span class="label-row"><span>Svartpunkt</span><span class="slider-value" id="val-bp">0</span></span><input type="range" id="slider-bp" min="0" max="255" step="1" value="0"></label>
            <label><span class="label-row"><span>Vitpunkt</span><span class="slider-value" id="val-wp">255</span></span><input type="range" id="slider-wp" min="0" max="255" step="1" value="255"></label>
            <label><span class="label-row"><span>Färgmättnad</span><span class="slider-value" id="val-saturation">100%</span></span><input type="range" id="slider-saturation" min="0" max="5" step="0.1" value="1"></label>
            <hr>
            <label><span class="label-row"><span>Dithering</span><span class="slider-value" id="val-dither">50%</span></span><input type="range" id="slider-dither" min="0" max="1" step="0.1" value="0.5"></label>
            
          </div>
          <div class="preview-container">
            <h3>Resultat (29x29)</h3>
            <canvas id="canvas-result" width="290" height="290"></canvas>
            <button id="btn-download-pdf">Ladda ner PDF</button>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
